<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://wunbsworstbbyuxunvst.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind1bmJzd29yc3RiYnl1eHVudnN0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDIzMTAyMDcsImV4cCI6MjA1Nzg4NjIwN30.8iZ31uR8vA_gA-zYp2p9y1z6q2q9y1z6q2q9y1z6q2q";
    
    // Diubah menjadi sbMegabond agar tidak bentrok dengan global identifier apa pun
    const sbMegabond = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    console.log("✅ Supabase initialized");

    const ADMIN_PASSWORD = "admin";
    let currentRole = "user";
    let studentsData = [];
    let activeStudentId = null;
    let currentTransactionType = "achievement";

    document.addEventListener("DOMContentLoaded", async () => {
      console.log("📱 App initializing...");
      setupPWA();
      await fetchStudentsFromSupabase();
      setupRealtimeListeners();
    });

    async function fetchStudentsFromSupabase() {
      try {
        console.log("🔄 Fetching students...");
        const { data: students, error } = await sbMegabond
          .from('students')
          .select('*')
          .order('stars', { ascending: false });

        if (error) {
          console.error("❌ Database error:", error);
          alert("⚠️ Connection failed. Check console. Did you create the tables in Supabase?");
          return;
        }
        
        studentsData = students || [];
        console.log("✅ Loaded", studentsData.length, "students");

        if (studentsData.length > 0 && !activeStudentId) {
          activeStudentId = studentsData[0].id;
        }

        renderLeaderboard();
        updateUserSelector();
        updatePodium();
        updateHeaderActiveUser();
      } catch (err) {
        console.error("❌ Error:", err.message);
      }
    }

    function setupRealtimeListeners() {
      console.log("🔌 Setting up realtime...");
      sbMegabond.channel('students-changes').on('postgres_changes', { event: '*', schema: 'public', table: 'students' }, async () => {
        console.log('📊 Students updated');
        await fetchStudentsFromSupabase();
      }).subscribe();

      sbMegabond.channel('history-changes').on('postgres_changes', { event: '*', schema: 'public', table: 'history' }, async () => {
        console.log('📝 History updated');
        await fetchStudentsFromSupabase();
      }).subscribe();
    }

    function setRole(role) {
      if (role === 'admin') {
        const inputPass = prompt("Masukkan Kata Sandi Administrator:");
        if (inputPass === ADMIN_PASSWORD) {
          currentRole = "admin";
          document.getElementById('adminPanel').classList.remove('hidden');
          document.getElementById('modalAdminDeleteBtnContainer').classList.remove('hidden');
          document.getElementById('headerPhotoUploadLabel').classList.remove('hidden');
          document.getElementById('btnRoleAdmin').className = "px-4 py-1.5 rounded-lg text-xs font-bold flex items-center gap-1.5 transition-all duration-200 bg-brand-600 text-white shadow-md";
          document.getElementById('btnRoleUser').className = "px-4 py-1.5 rounded-lg text-xs font-bold flex items-center gap-1.5 transition-all duration-200 text-purple-300 hover:text-white";
          console.log("🔐 Admin mode ON");
        } else {
          alert("❌ Kata sandi salah!");
          setRole('user');
        }
      } else {
        currentRole = "user";
        document.getElementById('adminPanel').classList.add('hidden');
        document.getElementById('modalAdminDeleteBtnContainer').classList.add('hidden');
        document.getElementById('headerPhotoUploadLabel').classList.add('hidden');
        document.getElementById('btnRoleUser').className = "px-4 py-1.5 rounded-lg text-xs font-bold flex items-center gap-1.5 transition-all duration-200 bg-brand-600 text-white shadow-md";
        document.getElementById('btnRoleAdmin').className = "px-4 py-1.5 rounded-lg text-xs font-bold flex items-center gap-1.5 transition-all duration-200 text-purple-300 hover:text-white";
      }
    }

    // ... (Sisa fungsi ke bawah tetap sama, hanya bagian interaksi Supabase yang disesuaikan)

    async function viewUserDetailByObjId(id) {
      const student = studentsData.find(s => s.id === id);
      if (!student) return;
      const rankIndex = studentsData.findIndex(s => s.id === id) + 1;

      document.getElementById('modalName').innerText = student.name;
      document.getElementById('modalAvatar').src = getAvatarUrl(student.avatar);
      document.getElementById('modalRankLabel').innerText = `#${rankIndex}`;
      const tier = determineTier(student.stars);
      document.getElementById('modalTierName').innerText = tier.name;
      document.getElementById('modalTotalStarsText').innerHTML = `<i class="fa-solid fa-star"></i> ${student.stars} Bintang`;

      const starIconsContainer = document.getElementById('modalStarIcons');
      starIconsContainer.innerHTML = "";
      const activeCount = student.stars % 5 || (student.stars > 0 ? 5 : 0);
      for(let s=1; s<=5; s++) starIconsContainer.innerHTML += `<i class="fa-solid fa-star ${s <= activeCount ? 'text-yellow-400' : 'text-slate-700'} text-xs"></i>`;

      const timelineContainer = document.getElementById('modalHistoryTimeline');
      const { data: histories } = await sbMegabond.from('history').select('*').eq('student_id', id).order('created_at', { ascending: false });
      timelineContainer.innerHTML = "";
      if (histories && histories.length > 0) {
        histories.forEach(h => {
          const icon = h.type === 'achievement' ? 'fa-award text-emerald-400' : 'fa-circle-minus text-rose-400';
          timelineContainer.innerHTML += `<div class="flex gap-3 text-xs border-l border-slate-800 pl-3 py-1">
            <i class="fa-solid ${icon} mt-0.5"></i>
            <div>
              <p class="font-bold text-slate-300">${h.description} (${h.stars_changed > 0 ? '+' : ''}${h.stars_changed} ★)</p>
              <p class="text-[10px] text-slate-500">${new Date(h.created_at).toLocaleDateString('id-ID')}</p>
            </div>
          </div>`;
        });
      } else {
        timelineContainer.innerHTML = "<p class='text-[11px] text-slate-500 italic'>Belum memiliki riwayat.</p>";
      }

      document.getElementById('btnDeleteStudent').onclick = () => deleteStudentPermanently(student.id);
      document.getElementById('userDetailModal').classList.remove('hidden');
    }

    async function handleAddStudent(event) {
      event.preventDefault();
      if (currentRole !== 'admin') return;

      const name = document.getElementById('newStudentName').value;
      const stars = parseInt(document.getElementById('newStudentStars').value) || 0;
      const avatarOption = document.querySelector('input[name="avatarOption"]:checked').value;

      try {
        const { error } = await sbMegabond.from('students').insert([{ name, stars, avatar: avatarOption }]);
        if (error) throw error;
        alert(`✅ Siswa ${name} berhasil disimpan.`);
        closeAddStudentModal();
        document.getElementById('addStudentForm').reset();
        await fetchStudentsFromSupabase();
      } catch (err) {
        alert("❌ Gagal: " + err.message);
      }
    }

    async function handleTransactionSubmit(event) {
      event.preventDefault();
      if (currentRole !== 'admin') return;

      const studentId = document.getElementById('transactionStudentSelect').value;
      const starsAmount = parseInt(document.getElementById('transactionStars').value) || 0;
      const description = document.getElementById('transactionNote').value;
      const student = studentsData.find(s => s.id === studentId);
      if (!student) return;

      let finalStarsChange = starsAmount;
      if (currentTransactionType === 'penalty') finalStarsChange = -starsAmount;
      const newTotalStars = Math.max(0, student.stars + finalStarsChange);

      try {
        const { error: updateError } = await sbMegabond.from('students').update({ stars: newTotalStars }).eq('id', studentId);
        if (updateError) throw updateError;

        const { error: historyError } = await sbMegabond.from('history').insert([{
          student_id: studentId,
          type: currentTransactionType,
          stars_changed: finalStarsChange,
          description: description
        }]);
        if (historyError) throw historyError;

        alert("✅ Log transaksi berhasil disimpan!");
        closeTransactionModal();
        document.getElementById('transactionForm').reset();
        await fetchStudentsFromSupabase();
      } catch (err) {
        alert("❌ Kesalahan: " + err.message);
      }
    }

    async function deleteStudentPermanently(studentId) {
      if (currentRole !== 'admin') return;
      if (!confirm("⚠️ Apakah Anda yakin ingin menghapus siswa ini?")) return;

      try {
        const { error } = await sbMegabond.from('students').delete().eq('id', studentId);
        if (error) throw error;
        alert("✅ Siswa berhasil dihapus.");
        closeUserDetailModal();
        await fetchStudentsFromSupabase();
      } catch (err) {
        alert("❌ Gagal: " + err.message);
      }
    }

    function setTransactionType(type) {
      currentTransactionType = type;
      const achBtn = document.getElementById('typeAchievementBtn');
      const penBtn = document.getElementById('typePenaltyBtn');
      if (type === 'achievement') {
        achBtn.className = "py-2.5 rounded-xl border border-emerald-500/30 bg-emerald-950/20 text-emerald-400 text-xs font-bold flex items-center justify-center gap-1.5 w-full text-center";
        penBtn.className = "py-2.5 rounded-xl border border-slate-800 bg-transparent text-slate-400 text-xs font-medium flex items-center justify-center gap-1.5 w-full text-center";
      } else {
        penBtn.className = "py-2.5 rounded-xl border border-rose-500/30 bg-rose-950/20 text-rose-400 text-xs font-bold flex items-center justify-center gap-1.5 w-full text-center";
        achBtn.className = "py-2.5 rounded-xl border border-slate-800 bg-transparent text-slate-400 text-xs font-medium flex items-center justify-center gap-1.5 w-full text-center";
      }
    }

    function updateUserSelector() {
      const selectElement = document.getElementById('transactionStudentSelect');
      selectElement.innerHTML = "";
      studentsData.forEach(s => selectElement.innerHTML += `<option value="${s.id}">${s.name}</option>`);
    }

    function updateHeaderActiveUser() {
      const selector = document.getElementById('currentUserSelector');
      selector.innerHTML = "";
      studentsData.forEach(s => selector.innerHTML += `<option value="${s.id}" ${s.id === activeStudentId ? 'selected' : ''}>${s.name}</option>`);
      const current = studentsData.find(s => s.id === activeStudentId);
      if (current) document.getElementById('currentActiveAvatar').src = getAvatarUrl(current.avatar);
    }

    function changeActiveUser(id) {
      activeStudentId = id;
      const current = studentsData.find(s => s.id === activeStudentId);
      if (current) document.getElementById('currentActiveAvatar').src = getAvatarUrl(current.avatar);
    }

    function handleSelfPhotoUpload(event) {
      const file = event.target.files[0];
      if (!file || !activeStudentId) return;
      const reader = new FileReader();
      reader.onloadend = async () => {
        try {
          const { error } = await sbMegabond.from('students').update({ avatar: reader.result }).eq('id', activeStudentId);
          if (error) throw error;
          alert("✅ Foto profil berhasil diperbarui!");
          await fetchStudentsFromSupabase();
        } catch (err) {
          alert("❌ Gagal: " + err.message);
        }
      };
      reader.readAsDataURL(file);
    }

    function handleModalPhotoUpload(event) { alert("⚠️ Fasilitas unggah gambar siap digunakan dalam mode Admin."); }
    function handleNewStudentAvatarUpload(event) {
      if (event.target.files[0]) document.getElementById('customAvatarName').classList.remove('hidden');
    }

    function openAddStudentModal() { document.getElementById('addStudentModal').classList.remove('hidden'); }
    function closeAddStudentModal() { document.getElementById('addStudentModal').classList.add('hidden'); }
    function openTransactionModal() { updateUserSelector(); setTransactionType('achievement'); document.getElementById('transactionModal').classList.remove('hidden'); }
    function closeTransactionModal() { document.getElementById('transactionModal').classList.add('hidden'); }
    function closeUserDetailModal() { document.getElementById('userDetailModal').classList.add('hidden'); }

    let deferredPrompt;
    function setupPWA() {
      const btnInstall = document.getElementById('btnInstallApp');
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        btnInstall.classList.remove('hidden');
      });
      btnInstall.addEventListener('click', async () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          if (outcome === 'accepted') btnInstall.classList.add('hidden');
          deferredPrompt = null;
        } else {
          const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
          alert(isIOS ? "📱 iOS: Share → Add to Home Screen" : "🤖 Android: Menu → Add to Home Screen");
        }
      });
    }
    
    // Fungsi bawaan pendukung yang tadinya ada di paling atas atau fungsi pembantu lainnya tetap dibiarkan
    function determineTier(stars) {
      if (stars >= 50) return { name: "RISING STAR", badgeClass: "bg-red-950/50 border-red-500/40 text-red-400" };
      if (stars >= 30) return { name: "Bintang Kejora", badgeClass: "bg-purple-950/50 border-purple-500/40 text-purple-400" };
      if (stars >= 15) return { name: "Bintang Menyala", badgeClass: "bg-emerald-950/50 border-emerald-500/40 text-emerald-400" };
      return { name: "Bintang Redup", badgeClass: "bg-slate-950/50 border-slate-700/40 text-slate-400" };
    }

    function getAvatarUrl(avatar) {
      if (!avatar) return "https://picsum.photos/seed/default/150/150";
      if (avatar.startsWith('http://') || avatar.startsWith('https://') || avatar.startsWith('data:image')) return avatar;
      return `https://picsum.photos/seed/${avatar}/150/150`;
    }

    function updatePodium() {
      for (let i = 1; i <= 3; i++) {
        const student = studentsData[i - 1];
        if (student) {
          document.getElementById(`p${i}-name`).innerText = student.name;
          document.getElementById(`p${i}-stars`).innerText = student.stars;
          const tier = determineTier(student.stars);
          document.getElementById(`p${i}-badge`).innerText = tier.name;
          document.getElementById(`p${i}-badge`).className = `px-2 py-0.5 text-[9px] font-bold rounded border ${tier.badgeClass}`;
          document.getElementById(`p${i}-avatar`).src = getAvatarUrl(student.avatar);
          document.getElementById(`p${i}-click`).onclick = () => viewUserDetailByObjId(student.id);
        }
      }
      for (let i = 4; i <= 5; i++) {
        const student = studentsData[i - 1];
        if (student) {
          document.getElementById(`p${i}-name`).innerText = student.name;
          document.getElementById(`p${i}-stars`).innerText = student.stars;
          document.getElementById(`p${i}-avatar`).src = getAvatarUrl(student.avatar);
          document.getElementById(`card-rank-${i}`).onclick = () => viewUserDetailByObjId(student.id);
        }
      }
    }

    function renderLeaderboard() {
      const listContainer = document.getElementById('leaderboardList');
      listContainer.innerHTML = "";
      const searchQuery = document.getElementById('studentSearch').value.toLowerCase();
      const filterTier = document.getElementById('tierFilter').value;

      studentsData.forEach((student, index) => {
        const tier = determineTier(student.stars);
        if (searchQuery && !student.name.toLowerCase().includes(searchQuery)) return;
        if (filterTier !== 'all' && tier.name !== filterTier) return;

        listContainer.innerHTML += `<div onclick="viewUserDetailByObjId('${student.id}')" class="leaderboard-item flex items-center justify-between p-3 bg-slate-900/40 border border-slate-800/80 rounded-xl hover:border-brand-500/40 cursor-pointer transition-all">
          <div class="flex items-center gap-3">
            <span class="text-xs font-bold text-slate-500 w-5">#${index + 1}</span>
            <img src="${getAvatarUrl(student.avatar)}" class="w-8 h-8 rounded-full object-cover" />
            <div>
              <p class="text-xs font-bold text-slate-200">${student.name}</p>
              <span class="text-[9px] px-1.5 py-0.2 rounded border ${tier.badgeClass}">${tier.name}</span>
            </div>
          </div>
          <div class="text-xs font-black text-yellow-400 flex items-center gap-1">
            <i class="fa-solid fa-star"></i> ${student.stars}
          </div>
        </div>`;
      });
    }
  </script>
